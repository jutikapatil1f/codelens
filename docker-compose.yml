# codelens/docker-compose.yml — full local stack
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
# Defaults to the bundled `postgres` service below; override via a .env file or
      # your shell to point at a managed DB. No secrets live in this file.
      DATABASE_URL: ${DATABASE_URL:-postgresql://dev:dev@postgres:5432/codelens}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder:7b
      # Required — compose fails fast if JWT_SECRET isn't set in the environment / .env.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in a .env file or your shell before running compose}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codelens
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d codelens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pg_data:
  ollama_data:
